name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject API key and cache-bust
        run: |
          sed -i 's/__ODDS_API_KEY__/${{ secrets.ODDS_API_KEY }}/g' index.html
          HASH=$(git rev-parse --short HEAD)
          sed -i "s/style.css/style.css?v=$HASH/g" index.html
          sed -i "s/app.js/app.js?v=$HASH/g" index.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
